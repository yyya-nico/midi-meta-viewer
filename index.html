<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MIDI メタ情報ビューア</title>
    <link rel="canonical" href="https://yyya-nico.com/midi-meta-viewer" />
    <meta name="color-scheme" content="dark" />
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <header>
      <button id="back" class="material-symbols-outlined" hidden>arrow_back</button>
      <h1><a href="/midi-meta-viewer">MIDI メタ情報ビューア</a></h1>
      <div class="song-name"></div>
    </header>
    <div class="wrap">
      <div class="sub">
        <label for="file-input">
          <span class="file-input-text">MIDIファイルを選択</span>
          <input type="file" id="file-input" accept="audio/midi,audio/sp-midi" multiple />
        </label>
        <div class="description">
          <p>
            MIDIファイルのメタ情報を表示します。XFフォーマットの情報も表示します。曲名、著作表記などのテキスト情報が確認できます。
          </p>
        </div>
        <ul id="midi-list"></ul>
      </div>
      <div class="main">
        <label for="charset-select">
          文字コード(XF項目を除く):
          <select id="charset-select">
            <option value="Latin1">英語 (Latin1)</option>
            <option value="Shift-JIS" selected>日本語 (Shift-JIS)</option>
            <option value="ISO-2022-KR">韓国語 (ISO-2022-KR)</option>
            <option value="HZ-GB-2312">簡体字中国語 (HZ-GB-2312)</option>
            <option value="Big5">繁体字中国語 (Big5)</option>
            <option value="KOI8-R">ロシア語 (KOI8-R)</option>
            <option value="CP1258">ベトナム語 (CP1258)</option>
          </select>
        </label>
        <div id="meta-view"></div>
      </div>
    </div>
  </body>
</html>
